<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Korean Family Card</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Nanum+Gothic:wght@400;700;800&display=swap');

        :root {
            --korean-blue: #0047a0;
            --korean-red: #cd2e3a;
            --korean-yellow: #ffcc00;
            --bg-gray: #f0f2f5;
            --card-white: #ffffff;
        }

        body {
            margin: 0;
            padding: 10px;
            background: #e9ecef;
            font-family: 'Nanum Gothic', sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
        }

        .app-container {
            width: 100%;
            max-width: 420px;
            background: var(--card-white);
            border-radius: 30px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.1);
            overflow: hidden;
            display: flex;
            flex-direction: column;
            border: 1px solid #ddd;
        }

        .app-header {
            background: var(--korean-blue);
            color: white;
            padding: 25px 20px; /* 여백 약간 조정 */
            text-align: center;
        }

        .app-header h1 {
            margin: 0;
            font-size: 24px;
            font-weight: 800;
            letter-spacing: -0.5px;
        }

        .app-header .source-tag {
            display: inline-block;
            margin-top: 8px;
            font-size: 11px;
            font-weight: 400;
            padding: 3px 12px;
            background: rgba(255, 255, 255, 0.15);
            border-radius: 12px;
            letter-spacing: 0.5px;
            opacity: 0.9;
        }

        .lang-selector {
            display: flex;
            justify-content: center;
            gap: 8px;
            padding: 12px;
            background: #f8f9fa;
            border-bottom: 1px solid #eee;
        }

        .lang-btn {
            padding: 8px 15px;
            border: 1px solid #ddd;
            border-radius: 20px;
            background: white;
            font-size: 13px;
            font-weight: 700;
            cursor: pointer;
            transition: 0.2s;
        }

        .lang-btn.active {
            background: var(--korean-blue);
            color: white;
            border-color: var(--korean-blue);
        }

        .card-perspective {
            perspective: 1200px;
            padding: 40px 20px;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .card-content {
            width: 100%;
            max-width: 300px;
            height: 220px;
            background: #fff;
            border-radius: 25px;
            border: 2px solid #eee;
            box-shadow: 0 10px 25px rgba(0,0,0,0.05);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            transition: transform 0.6s cubic-bezier(0.4, 0, 0.2, 1);
            transform-style: preserve-3d;
            cursor: pointer;
            position: relative;
            padding: 20px;
            box-sizing: border-box;
        }

        .card-content:hover {
            border-color: var(--korean-blue);
        }

        .cover-main-text {
            font-size: 46px;
            font-weight: 900;
            color: #222;
            margin: 0;
            letter-spacing: -1.5px;
            line-height: 1;
        }

        .cover-sub-text {
            font-size: 16px;
            font-weight: 700;
            color: #aaa;
            margin-top: 12px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .word-ko {
            font-size: 52px;
            font-weight: 800;
            color: #212529;
            margin-bottom: 12px;
            line-height: 1.2;
            word-break: keep-all;
            max-width: 100%;
        }

        .word-tr {
            font-size: 22px;
            font-weight: 700;
            color: var(--korean-blue);
            background: #eef2ff;
            padding: 8px 24px;
            border-radius: 25px;
            display: inline-block;
        }

        .control-area {
            padding: 0 30px 40px 30px;
        }

        .btn-tts {
            width: 100%;
            padding: 15px;
            background: white;
            border: 2px solid #ddd;
            border-radius: 20px;
            font-size: 18px;
            font-weight: 700;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            cursor: pointer;
            transition: 0.2s;
            box-shadow: 0 4px 0 #eee;
        }

        .btn-tts:active {
            transform: translateY(2px);
            box-shadow: 0 2px 0 #eee;
            background: #f8f9fa;
        }
    </style>
</head>
<body>

<div class="app-container">
    <div class="app-header">
        <h1>Korean Family Card</h1>
        <div class="source-tag">국립국어원 자료 활용</div>
    </div>

    <div class="lang-selector">
        <button class="lang-btn active" onclick="setLang('en')">English</button>
        <button class="lang-btn" onclick="setLang('vi')">Tiếng Việt</button>
        <button class="lang-btn" onclick="setLang('zh')">中国语</button>
        <button class="lang-btn" onclick="setLang('ja')">日本語</button>
    </div>

    <div class="card-perspective">
        <div class="card-content" id="card_face" onclick="drawCard()">
            <div id="card_inner">
                <div class="cover-main-text">Word Quiz</div>
                <div class="cover-sub-text">Click Here!</div>
            </div>
        </div>
    </div>

    <div class="control-area">
        <button class="btn-tts" id="tts_btn" onclick="speak()" style="display:none;">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"></polygon><path d="M19.07 4.93a10 10 0 0 1 0 14.14M15.54 8.46a5 5 0 0 1 0 7.07"></path></svg>
            Listen to Pronunciation
        </button>
    </div>
</div>

<script>
    const dataSet = [
        { ko: "할아버지", en: "Grandfather", vi: "Ông", zh: "爷爷", ja: "おじいさん" },
        { ko: "할머니", en: "Grandmother", vi: "Bà", zh: "奶奶", ja: "おばあさん" },
        { ko: "아버지", en: "Father", vi: "Bố", zh: "爸爸", ja: "お父さん" },
        { ko: "어머니", en: "Mother", vi: "Mẹ", zh: "妈妈", ja: "お母さん" },
        { ko: "형", en: "Older Brother", vi: "Anh", zh: "哥哥", ja: "お兄さん" },
        { ko: "누나", en: "Older Sister", vi: "Chị", zh: "姐姐", ja: "お姉さん" },
        { ko: "남동생", en: "Younger Brother", vi: "Em trai", zh: "弟弟", ja: "弟" },
        { ko: "여동생", en: "Younger Sister", vi: "Em gái", zh: "妹妹", ja: "妹" }
    ];

    let currentLang = 'en';
    let currentIndex = -1; 
    let isDrawing = false;

    function setLang(lang) {
        currentLang = lang;
        document.querySelectorAll('.lang-btn').forEach(btn => {
            btn.classList.remove('active');
            if(btn.innerText.toLowerCase().includes(lang) || 
               (lang==='zh' && btn.innerText==='中国语') || 
               (lang==='ja' && btn.innerText==='日本語')) {
                btn.classList.add('active');
            }
        });
        if (currentIndex !== -1) updateDisplay();
    }

    function drawCard() {
        if (isDrawing) return;
        isDrawing = true;

        const face = document.getElementById('card_face');
        face.style.transition = "transform 0.6s cubic-bezier(0.4, 0, 0.2, 1)";
        face.style.transform = "rotateY(0deg)";
        void face.offsetWidth; 
        
        face.style.transform = "rotateY(180deg)";
        
        setTimeout(() => {
            if (currentIndex === -1) {
                document.getElementById('tts_btn').style.display = 'flex';
            }

            let nextIndex;
            do {
                nextIndex = Math.floor(Math.random() * dataSet.length);
            } while (nextIndex === currentIndex); 
            
            currentIndex = nextIndex;
            updateDisplay();
        }, 300);

        setTimeout(() => {
            isDrawing = false;
        }, 600);
    }

    function updateDisplay() {
        const item = dataSet[currentIndex];
        const inner = document.getElementById('card_inner');
        inner.style.transform = "rotateY(180deg)";
        inner.innerHTML = `
            <div class="word-ko">${item.ko}</div>
            <div class="word-tr">${item[currentLang]}</div>
        `;
    }

    function speak() {
        if (currentIndex === -1) return;
        const text = dataSet[currentIndex].ko;
        const msg = new SpeechSynthesisUtterance(text);
        msg.lang = 'ko-KR';
        msg.rate = 0.9;
        window.speechSynthesis.speak(msg);
    }
</script>

</body>
</html>
